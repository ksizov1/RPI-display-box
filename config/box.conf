# Adiona-TV display box — site configuration
# Sourced as shell (KEY=VALUE, no spaces around =) by the first-boot script and
# the controller. Edit BEFORE building the image to change fleet-wide defaults.

# ── Wi-Fi access point (the LAN the Quest joins) ─────────────────────────────
# The SSID is generated per-device at first boot as:  <SSID_PREFIX>-XXXX
# where XXXX is a stable 4-hex-digit hash of the Pi's wlan0 MAC. So every box is
# uniquely named without per-card configuration. Only the prefix is set here.
SSID_PREFIX="Adiona-TV"

# Shared WPA2 passphrase (8–63 chars). Same on every box so a customer types it
# once per headset. CHANGE THIS before building your fleet image.
WIFI_PASSPHRASE="stoPdrunKdrivinG"

# 2.4 GHz channel (1, 6, or 11 recommended). 2.4 GHz has the best Quest range.
WIFI_CHANNEL="6"

# WiFi regulatory country (ISO 3166-1 alpha-2). REQUIRED: Raspberry Pi keeps the
# Wi-Fi radio rfkill-blocked until a country is set, so the AP can't broadcast
# without this. Set to your deployment region.
WIFI_COUNTRY="US"

# ── LAN addressing (NetworkManager 'shared' mode) ───────────────────────────
# The Pi is the gateway at <AP_GATEWAY> and hands out DHCP on this /24.
# NAT to the Ethernet uplink (eth0) is automatic whenever eth0 has a route.
AP_GATEWAY="192.168.50.1"
AP_CIDR="192.168.50.1/24"

# Path NetworkManager's shared-mode dnsmasq writes leases to (interface-named).
DHCP_LEASE_FILE="/var/lib/NetworkManager/dnsmasq-wlan0.leases"

# ── Casting / stream discovery ──────────────────────────────────────────────
# Port each Adiona-G headset serves its viewer + WebSocket stream on. Fixed by
# the app (Android can't bind <1024 without root) — do not change.
CAST_PORT="8080"

# How often (seconds) the controller re-scans connected headsets for an active
# cast server, and how long it holds "Reconnecting…" before falling back to the
# "waiting" screen after a live stream drops with no replacement.
SCAN_INTERVAL_SECONDS="2"
RECONNECT_GRACE_SECONDS="20"

# ── Local controller (what Chromium opens in kiosk) ─────────────────────────
# Loopback-only HTTP port for the controller's kiosk page + /state endpoint.
# Distinct from CAST_PORT to avoid confusion; never exposed off the box.
CONTROLLER_PORT="8090"
