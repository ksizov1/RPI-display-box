name: Build Adiona-TV image

# Builds the flashable 64-bit Raspberry Pi OS image in the cloud and uploads it
# as a build artifact — no local Linux/Docker needed. Run it from the Actions
# tab (workflow_dispatch) or on a version tag.
#
# Drives pi-gen directly (same as image/build-image.sh) rather than via a wrapper
# action, so the full pi-gen build log streams into the Actions output.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pi-gen cross-builds arm64 on this x86 runner. build-docker.sh does a
      # host-side `which qemu-aarch64` check and registers the binfmt handler
      # itself (with the fix_binary/F flag), so the host just needs the actual
      # qemu-aarch64 binary on PATH — provided by qemu-user / qemu-user-binfmt.
      - name: Install qemu for arm64 cross-build
        run: |
          sudo apt-get update
          # qemu-user-binfmt pulls qemu-user (provides /usr/bin/qemu-aarch64) and
          # registers binfmts. It conflicts with qemu-user-static, so don't install
          # that here — pi-gen's own build container installs the static variant.
          sudo apt-get install -y qemu-user-binfmt binfmt-support
          which qemu-aarch64

      - name: Assemble stage payload
        run: bash image/assemble-stage.sh

      - name: Clone pi-gen (arm64 / 64-bit branch)
        run: git clone --depth 1 --branch arm64 https://github.com/RPi-Distro/pi-gen.git pi-gen

      - name: Install custom stage + config
        run: |
          cp -r image/pi-gen/stage-adiona pi-gen/stage-adiona
          cp image/pi-gen/config pi-gen/config
          # Only our stage should export an image (stage2 still builds the rootfs).
          touch pi-gen/stage2/SKIP_IMAGES
          chmod +x pi-gen/stage-adiona/prerun.sh pi-gen/stage-adiona/00-install/01-run.sh

      - name: Build image with pi-gen (Docker)
        working-directory: pi-gen
        run: ./build-docker.sh

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: adiona-tv-image
          path: pi-gen/deploy/*
          if-no-files-found: error
